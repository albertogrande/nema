# SPDX-License-Identifier: Apache-2.0
name: Release

# On push to main, Changesets opens a "Version Packages" PR; merging THAT PR runs
# `pnpm release` (changeset publish) to publish @getnema/* + nema + create-nema to
# npm with provenance. Requires the NPM_TOKEN repo secret — an npm *Automation*
# token, which satisfies the getnema org's 2FA from CI.
#
# RELEASE_PAT (optional but recommended): a fine-grained PAT with this repo's
# Contents:write + Pull requests:write. Changesets pushes the "Version Packages"
# branch with whatever token it's given; commits pushed by the default GITHUB_TOKEN
# do NOT trigger other workflows (GitHub's recursion guard), so the required CI
# checks never run on that PR and it sits un-mergeable. Pushing with a PAT makes
# CI fire normally. Without the secret set, this falls back to GITHUB_TOKEN — the
# release still works, but the Version PR needs a manual close/reopen to run CI.
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm publish --provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: changesets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Push the Version Packages branch with the PAT (when set) so the
          # required CI checks trigger on that PR. Falls back to GITHUB_TOKEN.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          # Format after the version bump: `changeset version` rewrites package.json
          # in a layout biome's formatter would reject, which otherwise turns the lint
          # job red on main right after a release. `version:packages` re-formats them.
          version: pnpm run version:packages
        env:
          # PAT (when set) so the Version Packages PR's push triggers CI; else the
          # default token, which leaves that PR without check runs until reopened.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          # changesets/action only uses token-based publishing when it finds an env
          # var literally named NPM_TOKEN; without it, it falls back to OIDC trusted
          # publishing, which is not configured for these (first-publish) packages.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Provenance is intentionally OFF for the first release: it triggers a
          # changesets@2.31.0 crash (isAlreadyPublishedError TypeError) on some
          # packages. Re-enabled later via npm Trusted Publishing, which provides
          # provenance natively without a long-lived token.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
