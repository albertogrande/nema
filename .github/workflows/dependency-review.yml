# SPDX-License-Identifier: Apache-2.0
name: Dependency Review

# On every PR, flag dependencies being added/updated that carry known vulnerabilities
# or incompatible licenses. Advisory only — it surfaces findings as a PR comment but
# never blocks a merge, and tolerates repos where the Dependency graph feature is off
# (single-maintainer, zero-config: no GitHub UI setup required to merge).
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  review:
    name: dependency review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Dependency Review
        # Advisory: a failure here (high-sev finding, or Dependency graph disabled)
        # must not block the PR. Findings still post as a comment for the maintainer.
        continue-on-error: true
        uses: actions/dependency-review-action@v5
        with:
          comment-summary-in-pr: on-failure
          fail-on-severity: high
