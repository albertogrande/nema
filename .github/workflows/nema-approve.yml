# SPDX-License-Identifier: Apache-2.0
name: Nema Approve

# The human approval gate: when a maintainer approves a docs PR, promote the
# PR's draft pages to reviewed and merge. This is the only path to `reviewed`.
on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    name: promote draft → reviewed
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          # NEMA_PROMOTE_TOKEN: a PAT or GitHub App installation token with
          # contents:write + pull-requests:write, allowed to push to the protected
          # branch. Unlike GITHUB_TOKEN, a push authenticated with it re-triggers CI on
          # the promotion commit, so the auto-merge below waits on a real status check
          # instead of bypassing branch protection with --admin.
          token: ${{ secrets.NEMA_PROMOTE_TOKEN }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @getnema/actions build
      - name: Configure git identity
        run: |
          git config user.name "nema-bot"
          git config user.email "nema-bot@users.noreply.github.com"
      - name: Promote and merge
        run: node packages/actions/dist/approve-action.js
        env:
          # Same elevated token so `gh pr merge --auto` can enable auto-merge and the
          # promotion push (above) re-triggers CI. Requires repo auto-merge enabled and
          # branch protection requiring the nema check.
          GH_TOKEN: ${{ secrets.NEMA_PROMOTE_TOKEN }}
