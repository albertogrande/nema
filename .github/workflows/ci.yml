# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build & test (node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  smoke-publish:
    name: smoke (publish artifacts → day-1 app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Pack real tarballs and run a stranger's full flow (scaffold --app → install →
      # next build) against them — proves the publish candidates render with no clone.
      - run: pnpm smoke

  reuse:
    name: reuse (license) compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: fsfe/reuse-action@v6

  gates:
    name: nema check (dogfood)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so `nema check` can compare a `method:migration` promotion
          # against the PR base branch (createFsGitState baseline). Without it the
          # baseline falls back to HEAD and an in-PR promotion goes uncaught.
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Dogfood: validate the example corpus with our own gates (run the built CLI directly).
      - run: node packages/cli/dist/index.js check examples/minimal
      - run: node packages/cli/dist/index.js check apps/docs

  concurrent-demo:
    name: multi-agent demo (slot leasing + merge-time coherence)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Dogfood the moat: drive the real CLI through leasing + coherence end to end.
      # The script asserts each outcome and exits non-zero on any regression.
      - run: git config --global user.email ci@nema.dev && git config --global user.name CI
      - run: pnpm demo:concurrent
      # Dogfood the code-drift engine: bind → drift → re-stamp, asserted end to end.
      - run: pnpm demo:drift

  doctor:
    name: nema doctor (operator config, advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Advisory: surface operator-config drift (CI scope, promotion wiring, SSOT) without
      # blocking merges yet. Promote to a blocking gate once nema check covers PR-changed pages.
      - run: node packages/cli/dist/index.js doctor . --skip-network || true
