# SPDX-License-Identifier: Apache-2.0
name: Secret Scan

# Scan the diff (PRs) and full history (push to main) for committed secrets.
# gitleaks-action is free for public repositories.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
