version = 1
SPDX-PackageName = "nema"
SPDX-PackageSupplier = "The Nema Authors"
SPDX-PackageDownloadLocation = "https://github.com/albertogrande/nema"

[[annotations]]
path = [
  "**/package.json",
  "**/tsconfig.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "turbo.json",
  "biome.json",
  "tsconfig.base.json",
  ".changeset/**",
  ".github/**",
  "**/*.ts",
  "**/*.tsx",
  "**/*.mjs",
  "**/*.css",
  "**/*.md",
  "**/*.yaml",
  "**/*.yml",
  "**/*.json",
  ".gitignore",
  ".npmrc",
  "**/next-env.d.ts",
  "**/*.placeholder",
  "NOTICE",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 The Nema Authors"
SPDX-License-Identifier = "Apache-2.0"
