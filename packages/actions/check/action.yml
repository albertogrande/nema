# SPDX-License-Identifier: Apache-2.0
name: Nema Check
description: Run all Nema gates (nema check) against a docs corpus.
inputs:
  path:
    description: Repo root or content root to check
    required: false
    default: "."
runs:
  using: composite
  steps:
    - name: nema check
      shell: bash
      run: npx --yes nema check "${{ inputs.path }}"
