# SPDX-License-Identifier: Apache-2.0
name: Nema Freshness
description: >
  Freshness watch — runs nema check on a schedule so that overdue reviewed
  pages (review_by < today) fail loudly and can be re-reviewed.
inputs:
  path:
    description: Repo root or content root to check
    required: false
    default: "."
runs:
  using: composite
  steps:
    - name: nema check (freshness SLA enforced)
      shell: bash
      run: npx --yes nema check "${{ inputs.path }}"
